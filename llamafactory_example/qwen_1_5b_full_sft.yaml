# Register your step3 JSON in LLaMA-Factory's dataset_info.json,
# then replace the custom fields below before training.

### model
model_name_or_path: path/to/your/model

### method
stage: sft
do_train: true
finetuning_type: full
deepspeed: llamafactory_example/deepspeed/ds_z2_config.json

### dataset
dataset: "your_registered_dataset_name"
template: deepseekr1
cutoff_len: 8192
max_samples: 1000000
overwrite_cache: true
preprocessing_num_workers: 16
dataloader_num_workers: 16

### output
output_dir: path/to/your/output_dir
logging_steps: 10
save_steps: 500
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: none

### train
per_device_train_batch_size: 2
gradient_accumulation_steps: 4
learning_rate: 1.0e-5
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null
